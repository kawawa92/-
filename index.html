<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>星取表シミュレーター</title>

<style>
body {
  font-family: sans-serif;
  max-width: 1000px;
  margin: 16px auto;
  padding: 0 12px 24px;
  background: #f7f7f7;
}

.form-box {
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

button {
  width: 100%;
  padding: 10px;
  background: #1f6feb;
  color: #fff;
  border: none;
  border-radius: 8px;
}

.group-card {
  background: #fff;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.pattern-chip {
  font-family: monospace;
  padding: 6px 10px;
  background: #eef;
  border-radius: 999px;
}

.pattern-sub { display:none; }
.pattern-sub.open { display:flex; flex-wrap:wrap; gap:6px; }

.toggle-link {
  color:#1f6feb;
  cursor:pointer;
  margin-top:6px;
}
</style>
</head>

<body>

<h2>星取表シミュレーター</h2>

<div class="form-box">
現在得点 <input id="currentScore" type="number" value="50"><br>
目標得点 <input id="targetScore" type="number" value="80"><br>
残り試合 <input id="remainingGames" type="number" value="5"><br>

直近の勝敗
<select id="lastResult">
  <option value="win">勝ち</option>
  <option value="lose">負け</option>
</select>

<br><br>
<button onclick="calc()">計算</button>
</div>

<div id="result"></div>

<script>

function getStreakBlocks(arr){
  let blocks = [];
  let count = 0;

  for(let i=0;i<arr.length;i++){
    if(arr[i] === "○"){
      count++;
    }else{
      if(count>0) blocks.push(count);
      count = 0;
    }
  }
  if(count>0) blocks.push(count);

  return blocks;
}

function calc(){

  const current = Number(currentScore.value);
  const target = Number(targetScore.value);
  const n = Number(remainingGames.value);
  const last = lastResult.value === "win";

  const map = new Map();

  for(let mask=0; mask<(1<<n); mask++){

    let arr=[];
    for(let i=n-1;i>=0;i--){
      arr.push((mask&(1<<i))?"○":"×");
    }

    let prev = last;
    let score=0, win=0, streak=0;

    for(let r of arr){
      if(r==="○"){
        score+=4;
        win++;
        if(prev){
          score+=2;
          streak+=2;
        }
        prev=true;
      }else{
        prev=false;
      }
    }

    let final = current+score;
    let diff = final-target;

    if(Math.abs(diff)<=3){

      const blocks = getStreakBlocks(arr);
      const key = `${win}_${streak}_${score}_${blocks.join("-")}`;

      if(!map.has(key)){
        map.set(key,{
          win,streak,score,final,diff,
          blocks,
          patterns:[]
        });
      }

      map.get(key).patterns.push(arr.join(""));
    }
  }

  let groups=[...map.values()];

  let html="";

  groups.forEach((g,i)=>{

    const main=g.patterns[0];
    const rest=g.patterns.slice(1);

    html+=`
    <div class="group-card">
      <b>最終:${g.final}点</b> / 差:${g.diff}<br>
      勝:${g.win} 連勝:${g.streak} 点:${g.score}<br>
      連勝構成:[${g.blocks.join(",")}]<br><br>

      <span class="pattern-chip">${main}</span>
    `;

    if(rest.length>0){
      html+=`
        <div class="toggle-link" onclick="toggle(${i})">
          残り${rest.length}件
        </div>
        <div id="sub-${i}" class="pattern-sub">
          ${rest.map(p=>`<span class="pattern-chip">${p}</span>`).join("")}
        </div>
      `;
    }

    html+="</div>";
  });

  result.innerHTML=html;
}

function toggle(i){
  const el=document.getElementById("sub-"+i);
  el.classList.toggle("open");
}

</script>

</body>
</html>
