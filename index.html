<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星取表シミュレーター</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    .form-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      min-width: 180px;
      flex: 1;
    }
    label {
      font-weight: bold;
      margin-bottom: 4px;
    }
    input, select, button {
      font-size: 16px;
      padding: 8px;
    }
    button {
      cursor: pointer;
      margin-top: 8px;
    }
    .summary {
      margin: 12px 0;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #f5f5f5;
    }
    .note {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>星取表シミュレーター</h1>

  <div class="form-box">
    <div class="row">
      <div class="field">
        <label for="currentScore">現在得点</label>
        <input type="number" id="currentScore" value="50" />
      </div>

      <div class="field">
        <label for="targetScore">目標最終得点</label>
        <input type="number" id="targetScore" value="80" />
      </div>

      <div class="field">
        <label for="remainingGames">残り試合数</label>
        <select id="remainingGames">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9" selected>9</option>
        </select>
      </div>

      <div class="field">
        <label for="lastResult">直近の勝敗結果</label>
        <select id="lastResult">
          <option value="none">なし</option>
          <option value="win">勝ち</option>
          <option value="lose" selected>負け</option>
        </select>
      </div>
    </div>

    <button onclick="calculatePatterns()">計算する</button>
    <div class="note">
      ※ 1億点ボーナスは毎試合獲得前提で計算しています。<br>
      ※ 連勝ボーナスは、勝ちが連続したつながりごとに +2 です。
    </div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="result"></div>

  <script>
    function calculatePatterns() {
      const currentScore = Number(document.getElementById("currentScore").value);
      const targetScore = Number(document.getElementById("targetScore").value);
      const remainingGames = Number(document.getElementById("remainingGames").value);
      const lastResult = document.getElementById("lastResult").value;

      const patterns = [];
      const totalPatterns = Math.pow(2, remainingGames);

      for (let mask = 0; mask < totalPatterns; mask++) {
        const results = [];
        for (let i = remainingGames - 1; i >= 0; i--) {
          const isWin = (mask & (1 << i)) !== 0;
          results.push(isWin ? "○" : "×");
        }

        let gainedScore = 0;
        let winCount = 0;
        let streakBonus = 0;

        let prevWin = (lastResult === "win");

        for (let i = 0; i < results.length; i++) {
          const isWin = results[i] === "○";

          if (isWin) {
            gainedScore += 4; // 勝ち3 + 1億点ボーナス1
            winCount++;

            if (prevWin) {
              gainedScore += 2;
              streakBonus += 2;
            }
          }

          prevWin = isWin;
        }

        const finalScore = currentScore + gainedScore;
        const diff = finalScore - targetScore;

        if (Math.abs(diff) <= 3) {
          patterns.push({
            pattern: results.join(""),
            winCount,
            streakBonus,
            gainedScore,
            finalScore,
            diff
          });
        }
      }

      patterns.sort((a, b) => {
        const diffA = Math.abs(a.diff);
        const diffB = Math.abs(b.diff);

        if (diffA !== diffB) return diffA - diffB;
        if (a.finalScore !== b.finalScore) return b.finalScore - a.finalScore;
        if (a.winCount !== b.winCount) return a.winCount - b.winCount;
        return a.pattern.localeCompare(b.pattern);
      });

      document.getElementById("summary").textContent =
        `該当パターン: ${patterns.length}件`;

      if (patterns.length === 0) {
        document.getElementById("result").innerHTML =
          "<p>目標得点 ±3点 に入る組み合わせはありません。</p>";
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>星取表</th>
              <th>勝数</th>
              <th>連勝ボーナス</th>
              <th>残り試合の獲得点</th>
              <th>最終得点</th>
              <th>目標との差</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (const p of patterns) {
        const diffText = p.diff > 0 ? `+${p.diff}` : `${p.diff}`;
        html += `
          <tr>
            <td>${p.pattern}</td>
            <td>${p.winCount}</td>
            <td>${p.streakBonus}</td>
            <td>${p.gainedScore}</td>
            <td>${p.finalScore}</td>
            <td>${diffText}</td>
          </tr>
        `;
      }

      html += "</tbody></table>";
      document.getElementById("result").innerHTML = html;
    }

    calculatePatterns();
  </script>
</body>
</html>
