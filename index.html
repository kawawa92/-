<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>星取表シミュレーター</title>
<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #fff;
    padding: 16px;
  }

  input {
    padding: 6px;
    font-size: 16px;
    width: 80px;
  }

  button {
    padding: 6px 10px;
    font-size: 16px;
    margin-left: 8px;
  }

  .result {
    margin-top: 16px;
  }

  .card {
    border: 1px solid #555;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  .perfect {
    border: 2px solid #00ff88;
    background: #003322;
  }

  .pattern {
    font-family: monospace;
    margin-top: 6px;
  }

  .group-title {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
  }
</style>
</head>

<body>

<h2>星取表シミュレーター</h2>

目標得点：
<input id="target" type="number" value="80">
<button onclick="calculate()">計算</button>

<div id="output" class="result"></div>

<script>

function calculate() {
  const target = Number(document.getElementById("target").value);
  const totalMatches = 18;
  const tolerance = 3;

  const results = [];

  function generatePatterns(current) {
    if (current.length === totalMatches) {
      evaluate(current);
      return;
    }
    generatePatterns([...current, "○"]);
    generatePatterns([...current, "×"]);
  }

  function evaluate(pattern) {
    let score = 0;
    let winCount = 0;
    let prevWin = false;
    let streakBonus = 0;

    for (let i = 0; i < pattern.length; i++) {
      const isWin = pattern[i] === "○";

      // ★ 毎試合 +1（1億点ボーナス）
      score += 1;

      if (isWin) {
        score += 3; // 勝ち分
        winCount++;

        if (prevWin) {
          score += 2;
          streakBonus += 2;
        }
      }

      prevWin = isWin;
    }

    if (Math.abs(score - target) <= tolerance) {
      results.push({
        pattern,
        score,
        winCount,
        streakBonus
      });
    }
  }

  generatePatterns([]);

  // ★ グループ化
  const grouped = {};

  results.forEach(r => {
    const key = `${r.winCount}-${r.streakBonus}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  render(grouped, target);
}

function render(grouped, target) {
  const output = document.getElementById("output");
  output.innerHTML = "";

  Object.keys(grouped).forEach(key => {
    const group = grouped[key];
    const [wins, streak] = key.split("-");

    const title = document.createElement("div");
    title.className = "group-title";
    title.textContent = `勝ち:${wins} / 連勝ボーナス:${streak}`;
    output.appendChild(title);

    group.forEach(r => {
      const div = document.createElement("div");
      div.className = "card";

      if (r.score === target) {
        div.classList.add("perfect");
      }

      div.innerHTML = `
        得点: ${r.score}<br>
        <div class="pattern">${r.pattern.join(" ")}</div>
      `;

      output.appendChild(div);
    });
  });
}

</script>

</body>
</html>
